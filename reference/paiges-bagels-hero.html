<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paige's Bagels — Seriously Sourdough</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  :root {
    --blue: #004aad;
    --brown: #7a4900;
    --bg: #f6f4f0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    overflow-x: hidden;
    color: var(--blue);
  }

  /* === NAV — always off-white bg === */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    background: var(--bg);
    border-bottom: 1px solid rgba(0, 74, 173, 0.07);
  }
  
  .nav-logo img {
    height: 44px;
  }
  
  /* Desktop nav links */
  .nav-links-desktop {
    display: none;
    gap: 28px;
    align-items: center;
  }
  
  .nav-links-desktop a {
    text-decoration: none;
    color: var(--blue);
    font-weight: 500;
    font-size: 0.82rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    transition: color 0.3s;
  }
  
  .nav-links-desktop a:hover { color: var(--brown); }
  
  .btn-order {
    background: var(--blue);
    color: var(--bg);
    border: none;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .btn-order:hover {
    background: var(--brown);
  }

  /* Mobile hamburger */
  .hamburger {
    display: flex;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 8px;
    background: none;
    border: none;
  }
  
  .hamburger span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--blue);
    transition: all 0.3s;
  }
  
  .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

  /* Mobile menu */
  .mobile-menu {
    position: fixed;
    top: 68px; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 99;
    display: flex;
    flex-direction: column;
    padding: 40px 24px;
    gap: 0;
    transform: translateX(100%);
    transition: transform 0.35s ease;
  }
  
  .mobile-menu.open { transform: translateX(0); }
  
  .mobile-menu a {
    text-decoration: none;
    color: var(--blue);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.8rem;
    padding: 16px 0;
    border-bottom: 1px solid rgba(0, 74, 173, 0.08);
    transition: color 0.3s;
  }
  
  .mobile-menu a:hover { color: var(--brown); }
  
  .mobile-menu .btn-order {
    margin-top: 32px;
    padding: 16px;
    font-size: 0.9rem;
    text-align: center;
    width: 100%;
  }

  /* === HERO === */
  .hero {
    position: relative;
    height: 100svh;
    min-height: 600px;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
  }
  
  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 1;
  }
  
  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 30%;
  }
  
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      linear-gradient(
        to bottom,
        rgba(0, 15, 40, 0.05) 0%,
        rgba(0, 15, 40, 0.1) 35%,
        rgba(0, 15, 40, 0.45) 65%,
        rgba(0, 12, 35, 0.78) 100%
      );
    z-index: 2;
  }
  
  .hero-content {
    position: relative;
    z-index: 10;
    width: 100%;
    padding: 0 24px 48px;
    text-align: center;
  }
  
  .hero-tag {
    display: inline-block;
    font-weight: 600;
    font-size: 0.7rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.2s forwards;
  }
  
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 3.2rem;
    line-height: 1.05;
    color: #fff;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 0.9s ease 0.4s forwards;
  }
  
  .hero h1 em {
    font-style: italic;
    font-weight: 700;
    display: block;
    font-size: 3.6rem;
  }
  
  .hero-cta {
    opacity: 0;
    animation: fadeUp 0.9s ease 0.6s forwards;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }
  
  .btn-hero-primary {
    background: #fff;
    color: var(--blue);
    border: none;
    padding: 16px 0;
    width: 100%;
    max-width: 320px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .btn-hero-primary:hover {
    background: var(--bg);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.2);
  }
  
  .btn-hero-secondary {
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.35);
    padding: 14px 0;
    width: 100%;
    max-width: 320px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .btn-hero-secondary:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.5);
  }
  
  /* Scroll indicator */
  .scroll-hint {
    display: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* === TABLET+ (768px) === */
  @media (min-width: 768px) {
    nav {
      padding: 16px 40px;
    }
    
    .nav-logo img { height: 50px; }
    
    .hamburger { display: none; }
    
    .nav-links-desktop {
      display: flex;
    }
    
    .hero {
      align-items: center;
      justify-content: center;
    }
    
    .hero-bg img {
      object-position: center 35%;
    }
    
    .hero-content {
      padding: 80px 40px 0;
      max-width: 700px;
    }
    
    .hero-tag {
      font-size: 0.78rem;
      margin-bottom: 18px;
    }
    
    .hero h1 {
      font-size: 4.5rem;
    }
    
    .hero h1 em {
      font-size: 5rem;
    }
    
    .hero-cta {
      flex-direction: row;
      justify-content: center;
      gap: 16px;
    }
    
    .btn-hero-primary,
    .btn-hero-secondary {
      width: auto;
      padding: 16px 44px;
    }
    
    .scroll-hint {
      display: block;
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      opacity: 0;
      animation: fadeIn 1s ease 1.2s forwards;
    }
    
    .scroll-hint span {
      display: block;
      width: 1px;
      height: 44px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
      margin: 0 auto;
      animation: scrollPulse 2s ease-in-out infinite;
    }
  }
  
  /* === DESKTOP (1024px) === */
  @media (min-width: 1024px) {
    nav {
      padding: 18px 60px;
    }
    
    .nav-links-desktop {
      gap: 36px;
    }
    
    .hero h1 {
      font-size: 5.5rem;
    }
    
    .hero h1 em {
      font-size: 6rem;
    }
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes scrollPulse {
    0%, 100% { opacity: 0.4; transform: scaleY(1); }
    50% { opacity: 0.8; transform: scaleY(1.15); }
  }
</style>
</head>

<script>
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  
  hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('open');
    mobileMenu.classList.toggle('open');
    document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : '';
  });
  
  // Close menu on link click
  mobileMenu.querySelectorAll('a, button').forEach(el => {
    el.addEventListener('click', () => {
      hamburger.classList.remove('open');
      mobileMenu.classList.remove('open');
      document.body.style.overflow = '';
    });
  });
</script>
